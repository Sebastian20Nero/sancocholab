name: sancocholab

services:
  db:
    image: postgres:16-alpine
    container_name: sancocholab_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sancocholab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sancocholab}
      POSTGRES_DB: ${POSTGRES_DB:-sancocholab}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sancocholab} -d ${POSTGRES_DB:-sancocholab}"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: sancocholab-api:latest
    container_name: sancocholab_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${API_PORT:-3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-sancocholab}:${POSTGRES_PASSWORD:-sancocholab}@db:5432/${POSTGRES_DB:-sancocholab}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      BOOTSTRAP_SECRET: ${BOOTSTRAP_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4200,http://127.0.0.1:4200,http://localhost:8080,http://127.0.0.1:8080,http://localhost:3000,http://127.0.0.1:3000}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-true}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_NOMBRES: ${ADMIN_NOMBRES:-Admin}
      ADMIN_APELLIDOS: ${ADMIN_APELLIDOS:-SancochoLab}
      ADMIN_CELULAR: ${ADMIN_CELULAR:-0000000000}
      PRISMA_RUN_SEED: ${PRISMA_RUN_SEED:-false}
    ports:
      - "${API_PORT:-3000}:3000"

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sancocholab_pgadmin
    restart: unless-stopped
    profiles: ["tools"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@sancocholab.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin123}
      PGADMIN_DISABLE_POSTFIX: "1"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data: